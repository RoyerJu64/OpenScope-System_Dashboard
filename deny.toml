# Politique de dépendances (cargo-deny) : advisories de sécurité,
# licences autorisées, sources. Vérifié en CI (job « deny »).

[graph]
targets = [
    "x86_64-unknown-linux-gnu",
    "x86_64-pc-windows-msvc",
    "aarch64-apple-darwin",
]

[advisories]
version = 2
yanked = "deny"
# Alertes « unmaintained » (pas des vulnérabilités) provenant de la pile
# Tauri elle-même — à réévaluer à chaque montée de version de Tauri :
# - bindings GTK3 : requis par wry/tao sur Linux tant que WebKitGTK n'a
#   pas de bindings GTK4 (suivi upstream : tauri-apps/tauri#9662)
# - proc-macro-error, unic-* : dépendances transitives de tauri-utils
ignore = [
    "RUSTSEC-2024-0411", # gdk-pixbuf (GTK3)
    "RUSTSEC-2024-0412", # gdk (GTK3)
    "RUSTSEC-2024-0413", # atk (GTK3)
    "RUSTSEC-2024-0414", # gdkwayland-sys (GTK3)
    "RUSTSEC-2024-0415", # gtk (GTK3)
    "RUSTSEC-2024-0416", # atk-sys (GTK3)
    "RUSTSEC-2024-0417", # gdk-pixbuf-sys (GTK3)
    "RUSTSEC-2024-0418", # gdk-sys (GTK3)
    "RUSTSEC-2024-0419", # gdkx11-sys (GTK3)
    "RUSTSEC-2024-0420", # gtk-sys (GTK3)
    "RUSTSEC-2024-0370", # proc-macro-error (via tauri-utils)
    "RUSTSEC-2025-0075", # unic-* (via urlpattern/tauri-utils)
    "RUSTSEC-2025-0080",
    "RUSTSEC-2025-0081",
    "RUSTSEC-2025-0098",
    "RUSTSEC-2025-0100",
]

[licenses]
version = 2
# Projet double-licencié MIT/Apache-2.0 : on n'accepte que des licences
# permissives compatibles (+ MPL-2.0, copyleft faible par fichier).
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "BSL-1.0",
    "CC0-1.0",
    "Unicode-3.0",
    "MPL-2.0",
]

[bans]
multiple-versions = "warn"
wildcards = "deny"
# Les dépendances internes du workspace sont des `path` sans version.
allow-wildcard-paths = true

[sources]
unknown-registry = "deny"
unknown-git = "deny"
